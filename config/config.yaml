# ============================================================
# TrendPulse - 配置文件
# 修改此文件来自定义你的热点订阅
# ============================================================

# --------------------------------------------------
# 平台配置 - 选择你想关注的信息源
# type 类型说明：
#   newsnow      - 通过 NewsNow API 抓取（国内平台）
#   hackernews   - Hacker News 官方 API
#   github       - GitHub Trending 页面解析
#   reddit       - Reddit 公开 JSON API
#   producthunt  - Product Hunt RSS
#   rss          - 通用 RSS/Atom Feed
# --------------------------------------------------
platforms:
  # ================== 🇨🇳 国内热搜 ==================
  - id: "zhihu"
    name: "知乎热榜"
    type: "zhihu"
    enabled: true
    max_items: 20

  - id: "weibo"
    name: "微博热搜"
    type: "weibo"
    enabled: true
    max_items: 20

  - id: "baidu"
    name: "百度热搜"
    type: "baidu"
    enabled: true
    max_items: 20

  - id: "toutiao"
    name: "今日头条"
    type: "toutiao"
    enabled: true
    max_items: 20

  - id: "bilibili"
    name: "B站热搜"
    type: "bilibili"
    enabled: true
    max_items: 15

  - id: "douyin"
    name: "抖音热搜"
    type: "douyin"
    enabled: true
    max_items: 15

  - id: "tieba"
    name: "贴吧热议"
    type: "tieba"
    enabled: false
    max_items: 15

  # ================== 🇨🇳 国内财经 ==================
  - id: "wallstreetcn-hot"
    name: "华尔街见闻"
    type: "wallstreetcn"
    enabled: true
    max_items: 15

  - id: "cls-hot"
    name: "财联社热门"
    type: "newsnow"
    enabled: false
    max_items: 15

  - id: "thepaper"
    name: "澎湃新闻"
    type: "newsnow"
    enabled: false
    max_items: 15

  - id: "ifeng"
    name: "凤凰网"
    type: "newsnow"
    enabled: false
    max_items: 15

  # ================== 🌍 科技社区 ==================
  - id: "hackernews"
    name: "Hacker News"
    type: "hackernews"
    enabled: true
    max_items: 20

  - id: "producthunt"
    name: "Product Hunt"
    type: "producthunt"
    url: "https://www.producthunt.com/feed"
    enabled: true
    max_items: 15

  - id: "github-trending"
    name: "GitHub Trending"
    type: "github"
    enabled: true
    max_items: 15

  # ================== 🌍 社交媒体 ==================
  - id: "reddit"
    name: "Reddit Popular"
    type: "reddit"
    enabled: true
    max_items: 20

  # ================== 🌍 国际媒体 ==================
  - id: "techcrunch"
    name: "TechCrunch"
    type: "rss"
    url: "https://techcrunch.com/feed/"
    enabled: true
    max_items: 15

  - id: "theverge"
    name: "The Verge"
    type: "rss"
    url: "https://www.theverge.com/rss/index.xml"
    enabled: true
    max_items: 15

  - id: "arstechnica"
    name: "Ars Technica"
    type: "rss"
    url: "https://feeds.arstechnica.com/arstechnica/index"
    enabled: true
    max_items: 15

  - id: "bbc-tech"
    name: "BBC Technology"
    type: "rss"
    url: "https://feeds.bbci.co.uk/news/technology/rss.xml"
    enabled: true
    max_items: 15

  - id: "bbc-world"
    name: "BBC World"
    type: "rss"
    url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    enabled: false
    max_items: 15


# --------------------------------------------------
# 显示配置
# --------------------------------------------------
display:
  # 每个平台最多显示几条（未被关键词过滤时生效）
  max_items_per_platform: 10
  # 是否显示排名编号
  show_rank: true
  # 是否显示热度值
  show_hot_value: true
  # 是否显示来源链接
  show_url: true
  # 是否显示正文摘要（相关新闻主要内容）
  show_summary: true
  # 是否在控制台显示进度条
  show_progress: true
  # 是否生成可视化看板 (HTML 报告)
  enable_dashboard: true

# --------------------------------------------------
# 翻译配置
# --------------------------------------------------
translation:
  # 是否开启全量中文（自动翻译国际资讯）
  enabled: true
  # 并发翻译数量
  max_workers: 5

# --------------------------------------------------
# 缓存配置 (去重机制)
# ----------------------------------------------
cache:
  # 是否启用消息去重（避免重复收到已看过的热点）
  enabled: true
  # 缓存文件存储路径
  file: "config/cache.json"
  # 缓存保留天数（过期自动清理）
  expire_days: 7

# --------------------------------------------------
# AI 智能摘要配置
# --------------------------------------------------
ai_summarization:
  # 是否开启 AI 智能摘要
  enabled: true
  # 模型名称 (gemini-1.5-flash, gpt-4o 等)
  model: "gemini-1.5-flash"
  # API 代理或基础 URL (留空则使用默认)
  base_url: ""
  # 是否生成全天候趋势总览 (今日洞察)
  enable_daily_insight: true
  # 是否为每个关键词组生成聚合摘要
  enable_group_summary: true
  # 是否开启深度阅读 (提取正文全文进行 AI 浓缩)
  enable_deep_reading: true
  # 深度阅读触发阈值 (仅针对匹配到关键词且排名前 N 的条目)
  deep_reading_top_n: 3

# --------------------------------------------------
# 语义雷达配置 (AI 向量过滤)
# --------------------------------------------------
semantic_radar:
  # 是否开启语义雷达 (捕捉语义相关但未含关键词的热点)
  enabled: true
  # 相似度阈值 (0.0 - 1.0)
  # 建议 0.65 - 0.75，越高质量要求越高，越低越容易捕捉模糊关联
  threshold: 0.7

# --------------------------------------------------
# 通知渠道配置 (多渠道推送)
# --------------------------------------------------
notifications:
  # 企业微信 (WeWork) - 默认保持旧环境变量 WEWORK_WEBHOOK_URL
  wework:
    enabled: true
    msg_type: "markdown"

  # Bark (iOS 推送)
  bark:
    enabled: false
    device_key: ""
    base_url: "https://api.day.app"

  # 钉钉 (DingTalk)
  dingtalk:
    enabled: false
    webhook_url: ""
